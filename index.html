<!DOCTYPE html>
<html lang="ko">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
        }
        header {
            background-color: #2c3e50;
            color: white;

            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h2 { border-bottom: 2px solid #2c3e50; padding-bottom: 10px; color: #2c3e50; }
        ul { list-style-type: none; padding: 0; }
        li {
            background: #e8f4fd;
            margin: 8px 0;
            padding: 10px;
            border-radius: 5px;
            display: inline-block;
            margin-right: 5px;
        }
        footer { text-align: center; color: #7f8c8d; font-size: 0.9em; margin-top: 50px; }

</head>
<body>
